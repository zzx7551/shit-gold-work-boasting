services:
  - type: web
    name: job-packager-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AI_PROVIDER
        value: deepseek
      - key: AI_BASE_URL
        value: https://api.deepseek.com
      - key: AI_MODEL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_TEMPERATURE
        value: "0.8"
      - key: AI_TIMEOUT_SECONDS
        value: "30"
      - key: AI_MAX_TOKENS
        value: "260"
      - key: AI_CONTINUE_MAX_TOKENS
        value: "160"
